<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button, input { font-family: inherit; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #111;
      font-family: 'Work Sans', sans-serif;
    }

    /* ── Mosaic grid ─────────────────────────────────────────────────────── */
    #mosaic {
      display: grid;
      grid-template-columns: 3fr 2fr;
      grid-template-rows: 5fr 3fr 1.2fr;
      gap: 10px;
      padding: 10px;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      box-sizing: border-box;
    }

    /* ── Panel base ──────────────────────────────────────────────────────── */
    .panel {
      --lift: 5px;
      --spring: cubic-bezier(.5, 2.5, .7, .7);
      border-radius: 16px;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
      transform: translateY(0);
      box-shadow: 0 var(--lift) 0 0 rgba(0,0,0,0.35);
      transition:
        transform 0.35s var(--spring),
        box-shadow 0.35s var(--spring),
        filter 0.15s ease;
      text-align: left;
    }
    .panel:hover {
      transform: translateY(calc(-1 * var(--lift)));
      box-shadow: 0 calc(var(--lift) * 2) 0 0 rgba(0,0,0,0.35);
      filter: brightness(1.06);
    }
    .sdg-mark { transition: opacity 0.12s ease; }
    .sdg-mark.blink { opacity: 0.03 !important; }
    .panel:active {
      transform: translateY(calc(-1 * var(--lift) / 2));
      transition-duration: 0.08s;
      filter: brightness(0.96);
    }
    .panel.busy {
      pointer-events: none;
      filter: brightness(0.88);
    }

    /* ── Panel colors ────────────────────────────────────────────────────── */
    #skipPanel     { background: #E03E1A; grid-row: 1 / 4; grid-column: 1; }
    #askPanel      { background: #E8E0B0; grid-row: 1;     grid-column: 2; }
    #askPanel .panel-title { color: #0C3543; }
    #submitPanel   { background: #F5C200; grid-row: 2;     grid-column: 2; }
    #classicsPanel { background: #7DC4C4; grid-row: 3;     grid-column: 2; }
    #submitPanel .panel-title,
    #classicsPanel .panel-title { color: #0C3543; }

    /* ── Panel label ─────────────────────────────────────────────────────── */
    .panel-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 6px;
    }
    .panel-title {
      font-size: clamp(20px, 2.4vw, 36px);
      font-weight: 600;
      color: #fff;
      line-height: 1.15;
    }
    #skipPanel .panel-title {
      font-size: clamp(28px, 3.8vw, 56px);
    }
    .count-badge {
      display: inline-block;
      background: rgba(255,255,255,0.25);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      border-radius: 20px;
      padding: 1px 7px;
      margin-left: 7px;
      vertical-align: middle;
      letter-spacing: 0.04em;
    }
    #classicsPanel .panel-title {
      font-size: clamp(13px, 1.4vw, 20px);
    }

    /* ── SDG mark watermark ──────────────────────────────────────────────── */
    .sdg-mark {
      position: absolute;
      top: 26px;
      left: 30px;
      width: 34px;
      height: auto;
      opacity: 0.25;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Constellation canvas ────────────────────────────────────────────── */
    #dotField {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      border-radius: 16px;
    }
    #skipPanel .panel-title {
      position: relative;
      z-index: 1;
    }

    /* ── Prompt overlay ──────────────────────────────────────────────────── */
    #promptOverlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      overflow: hidden;
    }
    #promptOverlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* Video background */
    #bgVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    #videoOverlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.65);
      z-index: 1;
    }

    #promptCard {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 48px;
    }
    #promptText {
      font-size: clamp(54px, 8vw, 120px);
      font-weight: 700;
      color: #111;
      line-height: 1.2;
      cursor: pointer;
      max-width: 960px;
    }
    #copiedHint {
      font-size: 12px;
      letter-spacing: 0.1em;
      color: rgba(0,0,0,0.4);
      text-transform: uppercase;
      margin-top: 20px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    #copiedHint.show { opacity: 1; }

    #modalActions {
      margin-top: 48px;
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
    }
    .modal-btn {
      --lift: 8px;
      --spring: cubic-bezier(.5, 2.5, .7, .7);
      display: none;
      background: transparent;
      border: none;
      border-radius: 9999px;
      padding: 27px 66px;
      font-family: 'Work Sans', sans-serif;
      font-size: 27px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: rgba(0,0,0,0.55);
      cursor: pointer;
      box-shadow: inset 0 0 0 1.5px rgba(0,0,0,0.28), 0 var(--lift) 0 0 rgba(0,0,0,0.12);
      transform: translateY(0);
      transition: transform 0.3s var(--spring), box-shadow 0.3s var(--spring), color 0.2s;
      text-transform: uppercase;
    }
    .modal-btn.visible { display: inline-block; }
    .modal-btn:hover {
      color: #111;
      transform: translateY(calc(-1 * var(--lift)));
      box-shadow: inset 0 0 0 1.5px #111, 0 calc(var(--lift) * 2) 0 0 rgba(0,0,0,0.12);
    }
    .modal-btn:active { transform: translateY(calc(-1 * var(--lift) / 2)); transition-duration: 0.08s; }
    .modal-btn.struck { opacity: 0.2; pointer-events: none; }
    #doneBtn {
      background: #fff;
      color: #111;
      box-shadow: inset 0 0 0 1.5px rgba(0,0,0,0.1), 0 var(--lift) 0 0 rgba(0,0,0,0.15);
    }
    #doneBtn:hover {
      color: #111;
      box-shadow: inset 0 0 0 1.5px rgba(0,0,0,0.25), 0 calc(var(--lift) * 2) 0 0 rgba(0,0,0,0.15);
    }
    #anotherBtn {
      background: #E03E1A;
      color: #fff;
      box-shadow: inset 0 0 0 1.5px #E03E1A, 0 var(--lift) 0 0 rgba(0,0,0,0.22);
    }
    #anotherBtn:hover {
      color: #fff;
      background: #E03E1A;
      transform: translateY(calc(-1 * var(--lift)));
      box-shadow: inset 0 0 0 1.5px #c93515, 0 calc(var(--lift) * 2) 0 0 rgba(0,0,0,0.22);
    }

    #closeOverlay {
      position: fixed;
      top: 10px; right: 20px;
      z-index: 3;
      background: none;
      border: none;
      font-size: 112px;
      font-weight: 300;
      color: #0C3543;
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s;
    }
    #closeOverlay:hover { color: rgba(12,53,67,0.6); }

    /* Thinking dots over video */
    #thinkingAnim span { color: rgba(0,0,0,0.25); }

    /* ── Thinking state ──────────────────────────────────────────────────── */
    #thinkingAnim { display: none; }
    #thinkingAnim.visible { display: block; }
    #thinkingAnim span {
      display: inline-block;
      font-size: 28px;
      color: rgba(0,0,0,0.18);
      animation: waveDot 1.4s ease-in-out infinite;
    }
    #thinkingAnim span:nth-child(2) { animation-delay: 0.2s; }
    #thinkingAnim span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes waveDot {
      0%, 80%, 100% { opacity: 0.2; transform: translateY(0); }
      40% { opacity: 0.7; transform: translateY(-7px); }
    }

    /* ── Submit overlay ──────────────────────────────────────────────────── */
    #submitOverlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #submitOverlay.open { opacity: 1; pointer-events: all; }
    #submitBox {
      background: #fff;
      border-radius: 24px;
      padding: 60px 64px 52px;
      max-width: 720px;
      width: 90%;
      text-align: center;
    }
    #submitBox h2 {
      font-size: 32px;
      font-weight: 700;
      color: #111;
      margin-bottom: 10px;
    }
    #submitBox p {
      font-size: 15px;
      color: rgba(0,0,0,0.45);
      margin-bottom: 32px;
    }
    #submitInput {
      width: 100%;
      border: 2px solid rgba(0,0,0,0.15);
      border-radius: 14px;
      padding: 18px 22px;
      font-family: 'Work Sans', sans-serif;
      font-size: 20px;
      color: #111;
      outline: none;
      transition: border-color 0.2s;
    }
    #submitInput:focus { border-color: #E07C00; }
    #submitFeedback {
      font-size: 14px;
      color: rgba(0,0,0,0.4);
      margin-top: 14px;
      min-height: 20px;
    }

    /* ── Mode hint ───────────────────────────────────────────────────────── */
    #modeHint {
      position: fixed;
      bottom: 14px;
      right: 16px;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      pointer-events: none;
      z-index: 10;
      opacity: 1;
      transition: opacity 2s ease;
    }
    #modeHint.gone { opacity: 0; }

    /* ── Mobile overrides (must come last to win the cascade) ────────────── */
    @media (max-width: 768px) {
      #mosaic {
        grid-template-columns: 3fr 2fr;
      }
      .panel {
        padding: 18px 20px;
      }
      #askPanel .panel-title,
      #submitPanel .panel-title,
      #classicsPanel .panel-title {
        font-size: 16px;
      }
      #skipPanel .panel-title {
        font-size: clamp(34px, 7vw, 56px);
      }
      #modalActions {
        flex-direction: column;
        align-items: center;
        gap: 14px;
        margin-top: 32px;
      }
      .modal-btn {
        --lift: 5px;
        padding: 16px 40px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <!-- Mosaic buttons -->
  <div id="mosaic">
    <button class="panel" id="skipPanel">
      <canvas id="dotField"></canvas>
      <div class="panel-title">Get a question</div>
    </button>
    <button class="panel" id="askPanel">
      <div class="panel-title">Ask Claude</div>
    </button>
    <button class="panel" id="submitPanel">
      <div class="panel-title">Add a question</div>
    </button>
    <button class="panel" id="classicsPanel">
      <div class="panel-title">SDG Classics</div>
    </button>
  </div>

  <!-- Mode indicator -->
  <div id="modeHint"></div>

  <!-- Prompt overlay -->
  <div id="promptOverlay">
    <video id="bgVideo" autoplay muted loop playsinline></video>
    <div id="videoOverlay"></div>
    <button id="closeOverlay">×</button>
    <div id="promptCard">
      <div id="thinkingAnim"><span>·</span><span>·</span><span>·</span></div>
      <div id="promptText"></div>
      <div id="copiedHint">copied</div>
      <div id="modalActions">
        <button id="doneBtn" class="modal-btn">✓ Done</button>
        <button id="anotherBtn" class="modal-btn">Another please</button>
      </div>
    </div>
  </div>

  <!-- Submit overlay -->
  <div id="submitOverlay">
    <div id="submitBox">
      <h2>Add a question</h2>
      <p>Press Enter to add it to the pool.</p>
      <input id="submitInput" type="text" placeholder="" maxlength="150" />
      <div id="submitFeedback"></div>

    let promptQueue = [];
    const recentPrompts = [];
    function trackRecent(text) {
      recentPrompts.push(text);
      if (recentPrompts.length > 6) recentPrompts.shift();
    }
    function nextPrompt() {
      if (promptQueue.length === 0) promptQueue = [...prompts].sort(() => Math.random() - 0.5);
      return promptQueue.pop();
    }

    // ── State ─────────────────────────────────────────────────────────────
    let busy = false;
    let userPrompts = [];
    let graduatedClassics = [];
    let activeUserPrompt = null;

    const overlay      = document.getElementById('promptOverlay');
    const promptText   = document.getElementById('promptText');

    // ── Animated constellation ────────────────────────────────────────────

    let constellationRaf  = null;
    let animTime = 0;
    let mousePos = { x: null, y: null };
    let mouseVel = { x: 0, y: 0 };
    let textObstacle = null;
    // Pick one cursor "personality" at random each load

    const _sdgSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 169.1 165.9"><path fill="#fff" d="M85.7-.1c-.4,0-.8,0-1.2,0C39.3-.1,2.2,36.4,1.6,81.7c-.6,45.8,36.1,83.5,81.9,84.1.4,0,.8,0,1.2,0,45.2,0,82.4-36.5,83-81.9C168.2,38.2,131.5.5,85.7-.1ZM84.6,158.3c-.3,0-.7,0-1,0-41.6-.6-75-34.9-74.4-76.5C9.7,40.6,43.4,7.4,84.6,7.4s.7,0,1,0c41.6.6,75,34.9,74.4,76.5-.6,41.2-34.3,74.4-75.4,74.4ZM60.3,96.1c10,0,14.3-5.7,14.3-18.9s-2.8-14.8-11.1-18.1l-3.7-1.4c-4.1-1.6-5.9-3.5-5.9-10.4s2.6-9.2,6.5-9.2,6.3,1.1,6.6,9.1c0,.7.3,1.4.8,1.8.5.4,1.2.5,1.9.3l2.5-.4h.2c1.6-.6,1.6-1.9,1.6-2.4-.3-10.3-4.9-15.5-13.8-15.5s-13.8,5.6-13.8,16.6,2.7,14.3,11.2,17.6l3.7,1.4c3.9,1.5,5.8,3.6,5.8,11.2s-3.1,11.2-6.8,11.2-6.8-1.8-7.4-10.4c0-1-.5-1.5-.8-1.8-.4-.3-1-.6-1.9-.4l-2.6.5c-.7.1-1.8.6-1.8,2.5.5,11.1,5.4,16.7,14.5,16.7ZM119.5,108.1H49.7c-1.3,0-2.3,1-2.3,2.3v10.9c0,7.7,3.3,12.4,10,14.6,3.4,1.1,7.2,1.5,21.9,1.5s28,0,32.5-1.5c6.8-2.2,10-7,10-14.6v-10.9c0-1.3-1-2.3-2.3-2.3ZM114.6,120.8c0,4.4-1.5,6.7-5.2,8-2.2.7-12.9,1.2-30.1,1.2s-16.9-.4-19.4-1.2c-3.7-1.3-5.2-3.6-5.2-8v-5.2h60v5.2ZM122,60.8h-11.5c-1.3,0-2.3,1-2.3,2.3v2.5c0,1.3,1,2.3,2.3,2.3h6.4c0,13.2-.3,14.8-.8,16.5-1,2.9-3.2,4.4-6.5,4.4s-5.5-1.5-6.5-4.4c-.6-1.9-.8-3.5-.8-21s.3-19.1.8-21c1-3,3.1-4.4,6.4-4.4s6.6,2.4,7.4,7.5c.1.7.5,1.2,1,1.6.4.2,1,.5,1.8.2l2.6-.5h.2c1.2-.4,1.8-1.5,1.6-2.8-1.1-8.5-6.3-13.2-14.5-13.2s-11.6,3.2-13.6,9.3c-1,3-1.2,5.6-1.2,23.3s.3,20.3,1.2,23.3c2,6.1,6.7,9.3,13.6,9.3s11.6-3.2,13.6-9.3c1-3,1.2-5.4,1.2-21.2v-2.4c0-1.3-1-2.3-2.3-2.3Z"/></svg>`;
    const sdgFaceImg = new Image();
    sdgFaceImg.src = 'data:image/svg+xml,' + encodeURIComponent(_sdgSvg);

    function drawElectricLine(ctx, x1, y1, x2, y2) {
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.sqrt(dx*dx + dy*dy);
      if (len < 1) return;
      const nx = -dy/len, ny = dx/len;
      const segs = Math.max(4, Math.floor(len / 12));
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      for (let k = 1; k < segs; k++) {
        const t = k / segs;
        const off = (Math.random() - 0.5) * Math.min(len * 0.15, 10);
        ctx.lineTo(x1 + dx*t + nx*off, y1 + dy*t + ny*off);
      }
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    function drawWavyLine(ctx, x1, y1, x2, y2) {
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.sqrt(dx*dx + dy*dy);
      if (len < 1) return;
      const nx = -dy/len, ny = dx/len;
      const segs = Math.max(8, Math.floor(len / 8));
      const amp = Math.min(len * 0.07, 7);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      for (let k = 1; k <= segs; k++) {
        const t = k / segs;
        const wave = Math.sin(t * Math.PI * 4 + animTime * 3) * amp;
        ctx.lineTo(x1 + dx*t + nx*wave, y1 + dy*t + ny*wave);
      }
      ctx.stroke();
    }

    function drawSpringLine(ctx, x1, y1, x2, y2) {
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.sqrt(dx*dx + dy*dy);
      if (len < 1) return;
      const nx = -dy/len, ny = dx/len;
      const coils = Math.max(3, Math.floor(len / 14));
      const amp = 5;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      for (let k = 1; k <= coils * 2; k++) {
        const t = k / (coils * 2);
        const side = k % 2 === 0 ? amp : -amp;
        ctx.lineTo(x1 + dx*t + nx*side, y1 + dy*t + ny*side);
      }
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    function drawRopeLine(ctx, x1, y1, x2, y2) {
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.sqrt(dx*dx + dy*dy);
      if (len < 1) return;
      const nx = -dy/len, ny = dx/len;
      const segs = Math.max(8, Math.floor(len / 6));
      const amp = Math.min(len * 0.05, 4);
      for (let strand = 0; strand < 2; strand++) {
        const phase = strand * Math.PI + animTime * 2.5;
        ctx.beginPath();
        for (let k = 0; k <= segs; k++) {
          const t = k / segs;
          const wave = Math.sin(t * Math.PI * 5 + phase) * amp;
          const px = x1 + dx*t + nx*wave, py = y1 + dy*t + ny*wave;
          k === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.stroke();
      }
    }

    function drawDottedChain(ctx, x1, y1, x2, y2) {
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.sqrt(dx*dx + dy*dy);
      if (len < 1) return;
      const spacing = 9;
      const count = Math.floor(len / spacing);
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,1)';
      for (let k = 1; k < count; k++) {
        const t = k / count;
        ctx.beginPath();
        ctx.arc(x1 + dx*t, y1 + dy*t, 1.8, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // Measure the "Get a question" title's box in canvas coordinates so faces can bounce off it
    function computeTextObstacle() {
      const cvs = document.getElementById('dotField');
      const title = document.querySelector('#skipPanel .panel-title');
      if (!cvs || !title) { textObstacle = null; return; }
      const cr = cvs.getBoundingClientRect();
      const tr = title.getBoundingClientRect();
      textObstacle = { x: tr.left - cr.left, y: tr.top - cr.top, w: tr.width, h: tr.height };
    }

    // Bounce a face off the text box (treated as a solid AABB, padded by face radius)
    function resolveTextCollision(d, r) {
      if (!textObstacle) return;
      const bx = textObstacle.x - r, by = textObstacle.y - r;
      const bw = textObstacle.w + 2*r, bh = textObstacle.h + 2*r;
      if (d.x > bx && d.x < bx + bw && d.y > by && d.y < by + bh) {
        const dl = d.x - bx, dr = (bx + bw) - d.x;
        const dt = d.y - by, db = (by + bh) - d.y;
        const m = Math.min(dl, dr, dt, db);
        if      (m === dl) { d.x = bx;      d.vx = -Math.abs(d.vx); }
        else if (m === dr) { d.x = bx + bw; d.vx =  Math.abs(d.vx); }
        else if (m === dt) { d.y = by;      d.vy = -Math.abs(d.vy); }
        else               { d.y = by + bh; d.vy =  Math.abs(d.vy); }
        d.rotVel += (Math.random() - 0.5) * 0.04;
      }
    }

    function initDots(count) {
      const cvs = document.getElementById('dotField');
      if (!cvs) return;
      const W = cvs.parentElement.offsetWidth;
      const H = cvs.parentElement.offsetHeight;
      cvs.width  = W;
      cvs.height = H;
      computeTextObstacle();
      const pad = 52;
      const speed = 0.92;
      constellationDots = Array.from({ length: count }, () => ({
        x:  pad + Math.random() * (W - pad * 2),
        y:  pad + Math.random() * (H - pad * 2),
        vx: (Math.random() - 0.5) * speed,
        vy: (Math.random() - 0.5) * speed,
        rot:    Math.random() * Math.PI * 2,
        rotVel: (Math.random() - 0.5) * 0.012,
      }));
    }

    function tickDots() {
      const cvs = document.getElementById('dotField');
      if (!cvs) return;
      const W = cvs.width, H = cvs.height;
      const ctx = cvs.getContext('2d');
      const faceSize = 34;
      const facePad = faceSize / 2 + 4;
      const collideD = faceSize * 0.85;
      const maxSpeed = 2.6;
      ctx.clearRect(0, 0, W, H);
      animTime += 0.016;

      // Rotation wander + movement + wall bounce
      constellationDots.forEach(d => {
        d.rotVel += (Math.random() - 0.5) * 0.0003;
        d.rotVel *= 0.998;
        d.rot += d.rotVel;
        d.x += d.vx;
        d.y += d.vy;
        const spd = Math.sqrt(d.vx*d.vx + d.vy*d.vy);
        if (spd > maxSpeed) { d.vx = d.vx/spd*maxSpeed; d.vy = d.vy/spd*maxSpeed; }
        if (d.x < facePad)   { d.vx =  Math.abs(d.vx); d.x = facePad;   d.rotVel += (Math.random()-0.5)*0.04; }
        if (d.x > W-facePad) { d.vx = -Math.abs(d.vx); d.x = W-facePad; d.rotVel += (Math.random()-0.5)*0.04; }
        if (d.y < facePad)   { d.vy =  Math.abs(d.vy); d.y = facePad;   d.rotVel += (Math.random()-0.5)*0.04; }
        if (d.y > H-facePad) { d.vy = -Math.abs(d.vy); d.y = H-facePad; d.rotVel += (Math.random()-0.5)*0.04; }
        resolveTextCollision(d, faceSize / 2);
      });

      // Cursor interaction — behavior depends on the mode chosen at load
      if (mousePos.x !== null && (cursorMode === 'repel' || cursorMode === 'orbit' || cursorMode === 'swipe')) {
        const cursorR = cursorMode === 'swipe' ? 90 : cursorMode === 'repel' ? 55 : 75;
        constellationDots.forEach(d => {
          const cdx = d.x - mousePos.x;
          const cdy = d.y - mousePos.y;
          const dist = Math.sqrt(cdx*cdx + cdy*cdy);
          if (dist >= cursorR || dist <= 0.1) return;
          const falloff = (cursorR - dist) / cursorR;
          if (cursorMode === 'repel') {
            const force = falloff * falloff * 1.2;
            d.vx += cdx/dist * force;
            d.vy += cdy/dist * force;
            d.rotVel += (Math.random()-0.5)*0.10;
          } else if (cursorMode === 'orbit') {
            // Pull inward + tangential nudge → faces swirl around the cursor
            const pull = falloff * 0.04;
            d.vx -= cdx/dist * pull;
            d.vy -= cdy/dist * pull;
            d.vx += -cdy/dist * pull * 1.6;
            d.vy +=  cdx/dist * pull * 1.6;
            d.rotVel += 0.004;
          } else { // swipe — flick faces in the direction the mouse is moving
            const push = falloff * 0.5;
            d.vx += mouseVel.x * push * 0.1;
            d.vy += mouseVel.y * push * 0.1;
            d.rotVel += (mouseVel.x - mouseVel.y) * 0.002 * falloff;
          }
        });
      }
      mouseVel.x *= 0.85;
      mouseVel.y *= 0.85;

      // Single O(N²) pass: repulsion + styled lines
      const threshold = Math.min(W, H) * 0.3;
      ctx.lineWidth = 0.9;
      ctx.strokeStyle = 'rgba(255,255,255,1)';
      let hasDash = false;
      for (let i = 0; i < constellationDots.length; i++) {
        for (let j = i + 1; j < constellationDots.length; j++) {
          const a = constellationDots[i], b = constellationDots[j];
          const ddx = a.x - b.x;
          const ddy = a.y - b.y;
          const dist = Math.sqrt(ddx*ddx + ddy*ddy);

          // Node mode: every face pulls on every other — competing gravities
          if (cursorMode === 'node' && dist > collideD) {
            const g = Math.min(0.35 / dist, 0.011);
            const gx = ddx/dist * g, gy = ddy/dist * g;
            a.vx -= gx; a.vy -= gy;
            b.vx += gx; b.vy += gy;
          }

          // Elastic collision — faces bounce off each other instead of overlapping
          if (dist < collideD && dist > 0.1) {
            const nx = ddx / dist, ny = ddy / dist;
            // Push apart equally so they never overlap
            const overlap = (collideD - dist) / 2;
            a.x += nx * overlap; a.y += ny * overlap;
            b.x -= nx * overlap; b.y -= ny * overlap;
            // Exchange velocity along the collision normal (equal mass, elastic)
            const relN = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
            if (relN < 0) {
              a.vx -= relN * nx; a.vy -= relN * ny;
              b.vx += relN * nx; b.vy += relN * ny;
              // Impact transfers a bit of spin
              a.rotVel -= relN * 0.04;
              b.rotVel += relN * 0.04;
            }
          }

          // Styled connection lines
          if (dist < threshold) {
            ctx.globalAlpha = (1 - dist / threshold) * 0.45;
            const style = (i * 13 + j * 7) % 6;
            if (style === 2 && !hasDash) { ctx.setLineDash([4, 7]); hasDash = true; }
            if (style !== 2 && hasDash)  { ctx.setLineDash([]);     hasDash = false; }
            if (style === 0) {
              drawElectricLine(ctx, constellationDots[i].x, constellationDots[i].y, constellationDots[j].x, constellationDots[j].y);
            } else if (style === 1) {
              drawWavyLine(ctx, constellationDots[i].x, constellationDots[i].y, constellationDots[j].x, constellationDots[j].y);
            } else if (style === 2) {
              ctx.beginPath();
              ctx.moveTo(constellationDots[i].x, constellationDots[i].y);
              ctx.lineTo(constellationDots[j].x, constellationDots[j].y);
              ctx.stroke();
            } else if (style === 3) {
              drawSpringLine(ctx, constellationDots[i].x, constellationDots[i].y, constellationDots[j].x, constellationDots[j].y);
            } else if (style === 4) {
              drawRopeLine(ctx, constellationDots[i].x, constellationDots[i].y, constellationDots[j].x, constellationDots[j].y);
            } else {
              drawDottedChain(ctx, constellationDots[i].x, constellationDots[i].y, constellationDots[j].x, constellationDots[j].y);
            }
          }
        }
      }
      if (hasDash) ctx.setLineDash([]);

      // Node mode: the cursor itself joins the constellation — styled lines reach out to nearby faces
      if (cursorMode === 'node' && mousePos.x !== null) {
        const reach = Math.min(W, H) * 0.45;
        constellationDots.forEach((d, i) => {
          const cdx = d.x - mousePos.x, cdy = d.y - mousePos.y;
          const dist = Math.sqrt(cdx*cdx + cdy*cdy);
          if (dist >= reach) return;
          ctx.globalAlpha = (1 - dist / reach) * 0.55;
          const style = i % 6;
          if (style === 2) { ctx.setLineDash([4, 7]); } else { ctx.setLineDash([]); }
          if (style === 0)      drawElectricLine(ctx, mousePos.x, mousePos.y, d.x, d.y);
          else if (style === 1) drawWavyLine(ctx, mousePos.x, mousePos.y, d.x, d.y);
          else if (style === 2) { ctx.beginPath(); ctx.moveTo(mousePos.x, mousePos.y); ctx.lineTo(d.x, d.y); ctx.stroke(); }
          else if (style === 3) drawSpringLine(ctx, mousePos.x, mousePos.y, d.x, d.y);
          else if (style === 4) drawRopeLine(ctx, mousePos.x, mousePos.y, d.x, d.y);
          else                  drawDottedChain(ctx, mousePos.x, mousePos.y, d.x, d.y);
        });
        ctx.setLineDash([]);
      }

      // Draw SDG faces with individual rotation
      if (sdgFaceImg.complete && sdgFaceImg.naturalWidth > 0) {
        ctx.globalAlpha = 0.8;
        constellationDots.forEach(d => {
          ctx.save();
          ctx.translate(d.x, d.y);
          ctx.rotate(d.rot);
          ctx.drawImage(sdgFaceImg, -faceSize/2, -faceSize/2, faceSize, faceSize);
          ctx.restore();
        });
      }

      constellationRaf = requestAnimationFrame(tickDots);
    }

    const MILESTONES = new Set([10, 25, 50]);
    let lastCount = 0;
    function updatePromptCount() {
      if (constellationRaf) { cancelAnimationFrame(constellationRaf); constellationRaf = null; }
      const count = userPrompts.length;
      if (count === 0) {
        const cvs = document.getElementById('dotField');
        if (cvs) cvs.getContext('2d').clearRect(0, 0, cvs.width, cvs.height);
        lastCount = 0; return;
      }
      initDots(count);
      tickDots();
      if (MILESTONES.has(count) && count !== lastCount) {
        constellationDots.forEach(d => {
          const angle = Math.random() * Math.PI * 2;
          const spd = 2.5 + Math.random() * 2.5;
          d.vx = Math.cos(angle) * spd; d.vy = Math.sin(angle) * spd;
          d.rotVel = (Math.random() - 0.5) * 0.28;
        });
        setTimeout(() => {
          const norm = 0.28;
          constellationDots.forEach(d => {
            const spd = Math.sqrt(d.vx*d.vx + d.vy*d.vy);
            if (spd > norm) { d.vx = d.vx/spd*norm; d.vy = d.vy/spd*norm; }
            d.rotVel *= 0.3;
          });
        }, 1400);
      }
      lastCount = count;
    }

    async function loadUserPrompts() {
      try {
        const res = await fetch('/api/user-prompts');
        if (res.ok) { const d = await res.json(); userPrompts = d.prompts || []; }
      } catch {}
      updatePromptCount();
    }
    async function loadGraduatedClassics() {
      try {
        const res = await fetch('/api/classics-prompts');
        if (res.ok) { const d = await res.json(); graduatedClassics = d.prompts || []; }
      } catch {}
    }
    loadUserPrompts();
    loadGraduatedClassics();
    window.addEventListener('resize', () => {
      if (constellationRaf) { cancelAnimationFrame(constellationRaf); constellationRaf = null; }
      if (userPrompts.length > 0) { initDots(userPrompts.length); tickDots(); }
    });
    // Re-measure the text box once the web font has loaded (its width can shift)
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(computeTextObstacle);

    (function() {
      const panel = document.getElementById('skipPanel');
      panel.addEventListener('mousemove', e => {
        const cvs = document.getElementById('dotField');
        const rect = cvs.getBoundingClientRect();
        const nx = e.clientX - rect.left;
        const ny = e.clientY - rect.top;
        if (mousePos.x !== null) { mouseVel.x = nx - mousePos.x; mouseVel.y = ny - mousePos.y; }
        mousePos.x = nx;
        mousePos.y = ny;
      });
      panel.addEventListener('mouseleave', () => { mousePos.x = null; mousePos.y = null; mouseVel.x = 0; mouseVel.y = 0; });
    })();

    function nextClassic() {
      const pool = [...prompts, ...graduatedClassics];
      if (classicsQueue.length === 0) classicsQueue = [...pool].sort(() => Math.random() - 0.5);
      return classicsQueue.pop();
    }

    function setBusy(val) {
      busy = val;
      ['skipPanel','askPanel','classicsPanel'].forEach(id => {
        document.getElementById(id).classList.toggle('busy', val);
      });
    }

    function openOverlay() { overlay.classList.add('visible'); }
    function closeOverlay() {
      overlay.classList.remove('visible');
      const vid = document.getElementById('bgVideo');
      vid.pause();
      vid.src = '';
    }

    async function fetchBgVideo() {
      const vid = document.getElementById('bgVideo');
      try {
        const res = await fetch('/api/random-video');
        if (res.ok) {
          const { url } = await res.json();
          vid.src = url;
          vid.play().catch(() => {});
        }
      } catch {}
    }

    function startThinking() {
      promptText.style.display = 'none';
      thinkingAnim.classList.add('visible');
      openOverlay();
      fetchBgVideo();
    }
    function stopThinking() {
      thinkingAnim.classList.remove('visible');
      promptText.style.display = '';
    }

    async function showPrompt(text, isAI = false) {
      doneBtn.classList.remove('visible', 'struck');
      doneBtn.textContent = '✓ Done';
      anotherBtn.classList.remove('visible');

      // Quick shuffle then word-by-word reveal
      promptText.style.display = '';
      const delays = [90, 90, 100, 120, 150, 200, 260, 340];
      for (const ms of delays) {
        promptText.textContent = prompts[Math.floor(Math.random() * prompts.length)];
        await new Promise(r => setTimeout(r, ms));
      }
      promptText.innerHTML = '';
      const words = text.split(' ');
      for (let i = 0; i < words.length; i++) {
        const span = document.createElement('span');
        span.textContent = (i === 0 ? '' : ' ') + words[i];
        span.style.cssText = 'opacity:0;transition:opacity 0.18s ease';
        promptText.appendChild(span);
        requestAnimationFrame(() => requestAnimationFrame(() => { span.style.opacity = '1'; }));
        await new Promise(r => setTimeout(r, 65));
      }
      trackRecent(text);
      if (isAI) {
        const dot = document.createElement('span');
        dot.className = 'ai-dot';
        promptText.appendChild(dot);
      }
    }

    async function generate() {
      if (busy) return;
      setBusy(true);
      startThinking();

      if (userPrompts.length > 0) {
        const pick = userPrompts[Math.floor(Math.random() * userPrompts.length)];
        activeUserPrompt = pick;
        await showPrompt(pick);
        doneBtn.classList.add('visible');
        anotherBtn.classList.add('visible');
        stopThinking();
        setBusy(false);
        return;
      }

      try {
        const res = await fetch('/api/generate-prompt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ recentPrompts }),
        });
        if (!res.ok) throw new Error();
        const { prompt } = await res.json();
        await showPrompt(prompt, true);
      } catch {
        await showPrompt(nextPrompt());
      } finally {
        stopThinking();
        setBusy(false);
      }
    }

    // ── Button wiring ─────────────────────────────────────────────────────
    document.getElementById('skipPanel').addEventListener('click', () => generate());

    document.getElementById('askPanel').addEventListener('click', async () => {
      if (busy) return;
      setBusy(true);
      startThinking();
      try {
        const res = await fetch('/api/generate-prompt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ recentPrompts }),
        });
        if (!res.ok) throw new Error();
        const { prompt } = await res.json();
        await showPrompt(prompt, true);
      } catch {
        await showPrompt(nextPrompt());
      } finally {
        anotherBtn.classList.add('visible');
        stopThinking();
        setBusy(false);
      }
    });

    document.getElementById('classicsPanel').addEventListener('click', async () => {
      if (busy) return;
      setBusy(true);
      startThinking();
      await showPrompt(nextClassic());
      anotherBtn.classList.add('visible');
      stopThinking();
      setBusy(false);
    });

    // ── Submit overlay ────────────────────────────────────────────────────
    const submitOverlay  = document.getElementById('submitOverlay');
    const submitInput    = document.getElementById('submitInput');
    const submitFeedback = document.getElementById('submitFeedback');

    document.getElementById('submitPanel').addEventListener('click', () => {
      submitInput.value = '';
      submitFeedback.textContent = '';
      submitOverlay.classList.add('open');
      setTimeout(() => submitInput.focus(), 50);
    });
    submitOverlay.addEventListener('click', e => {
      if (e.target === submitOverlay) submitOverlay.classList.remove('open');
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        submitOverlay.classList.remove('open');
        closeOverlay();
      }
    });
    submitInput.addEventListener('keydown', async e => {
      if (e.key !== 'Enter') return;
      const text = submitInput.value.trim();
      if (text.length < 4) { submitFeedback.textContent = 'a bit short...'; return; }
      submitInput.disabled = true;
      submitFeedback.textContent = 'saving...';
      try {
        const res = await fetch('/api/user-prompts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (res.ok) {
          const { count } = await res.json();
          userPrompts.push(text);
          updatePromptCount();
          submitFeedback.textContent = `saved — ${count} question${count !== 1 ? 's' : ''} in the pool`;
          setTimeout(() => submitOverlay.classList.remove('open'), 1600);
        } else {
          submitFeedback.textContent = 'something went wrong';
        }
      } catch { submitFeedback.textContent = 'connection error'; }
      submitInput.disabled = false;
    });

    // ── Done button ───────────────────────────────────────────────────────
    doneBtn.addEventListener('click', async () => {
      if (!activeUserPrompt) return;
      const text = activeUserPrompt;
      activeUserPrompt = null;
      userPrompts = userPrompts.filter(p => p !== text);
      updatePromptCount();
      graduatedClassics.push(text);
      classicsQueue = [];
      doneBtn.classList.add('struck');
      doneBtn.textContent = '✓ Moved to classics';
      setTimeout(() => {
        doneBtn.classList.remove('visible', 'struck');
        doneBtn.textContent = '✓ Done';
      }, 1400);
      fetch('/api/user-prompts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'remove', text }),
      }).catch(() => {});
      fetch('/api/classics-prompts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      }).catch(() => {});
    });

    // ── Mode hint ─────────────────────────────────────────────────────────
    (function() {
      const hint = document.getElementById('modeHint');
      hint.textContent = cursorMode;
      setTimeout(() => hint.classList.add('gone'), 2500);
    })();

    // ── Spacebar shortcut ─────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === ' ' && !busy && !overlay.classList.contains('visible') && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault(); generate();
      }
    });

    // ── Sound effects ─────────────────────────────────────────────────────
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    // Pre-warm AudioContext on first real gesture so hover sounds work immediately
    ['pointerdown', 'keydown'].forEach(evt =>
      document.addEventListener(evt, () => getAudio(), { once: true })
    );
    function playHover(freq) {
      if (!audioCtx || audioCtx.state !== 'running') return;
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(0.04, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.09);
      osc.start(); osc.stop(ctx.currentTime + 0.09);
    }
    function playClick() {
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(360, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      osc.start(); osc.stop(ctx.currentTime + 0.12);
    }
    function playKey() {
      const ctx = getAudio();
      const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.014), ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      const src = ctx.createBufferSource();
      const filter = ctx.createBiquadFilter();
      const gain = ctx.createGain();
      filter.type = 'bandpass'; filter.frequency.value = 3200; filter.Q.value = 0.6;
      src.buffer = buf;
      src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.055, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.014);
      src.start();
    }
    document.getElementById('submitInput').addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== 'Backspace') playKey();
    });

    const panelFreqs = { skipPanel: 523, askPanel: 659, submitPanel: 784, classicsPanel: 880 };
    document.querySelectorAll('.panel').forEach(panel => {
      panel.addEventListener('mouseenter', () => playHover(panelFreqs[panel.id] || 660));
      panel.addEventListener('click', playClick);
    });


    // ── SDG face blink ────────────────────────────────────────────────────
    (function scheduleBlink() {
      setTimeout(() => {
        const mark = document.querySelector('.sdg-mark');
        if (mark) {
          mark.classList.add('blink');
          setTimeout(() => mark.classList.remove('blink'), 150);
        }
        scheduleBlink();
      }, 5000 + Math.random() * 9000);
    })();

    // ── Prompt card interactions ───────────────────────────────────────────
    document.getElementById('closeOverlay').addEventListener('click', closeOverlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeOverlay(); });
    anotherBtn.addEventListener('click', () => { closeOverlay(); generate(); });

    promptText.addEventListener('click', () => {
      const text = promptText.textContent;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        copiedHint.classList.add('show');
        setTimeout(() => copiedHint.classList.remove('show'), 1400);
      });
    });
  </script>
</body>
</html>
